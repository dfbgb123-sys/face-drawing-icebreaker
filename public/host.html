<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>진행자 화면 · 얼굴 그리기 아이스브레이커</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/host.css" />
</head>
<body>
  <div class="container">
    <header class="host-header">
      <h1>얼굴 그리기 아이스브레이커</h1>
      <p class="muted">진행자 화면</p>
    </header>

    <section id="view-setup">
      <div class="card" style="padding:20px;">
        <div class="setup-row">
          <label for="names">참가자 이름 (한 줄에 한 명, 앉은 순서대로)</label>
          <textarea id="names" placeholder="유지&#10;민서&#10;하늘&#10;다온&#10;서연"></textarea>
        </div>
        <div class="setup-row" style="max-width:160px;">
          <label for="roundLength">라운드 길이 (분)</label>
          <input id="roundLength" type="number" min="1" max="10" step="0.5" value="3" />
        </div>
        <div id="setup-error" class="muted" style="color:var(--danger); display:none;"></div>
        <button class="btn" id="create-btn" style="width:100%;">세션 만들기</button>
      </div>
    </section>

    <section id="view-lobby" style="display:none;">
      <div class="card join-panel">
        <img id="qr-img" alt="입장 QR코드" />
        <div class="join-url" id="join-url"></div>
        <p class="muted" style="margin:0;font-size:13px;">참가자들에게 QR코드를 보여주거나 위 주소를 알려주세요.</p>
      </div>
      <div class="card section-gap" style="padding:16px;">
        <ul class="roster" id="roster-list"></ul>
      </div>
      <div class="actions-row section-gap">
        <button class="btn" id="start-btn">시작</button>
        <button class="btn ghost" id="end-btn-lobby">세션 종료</button>
      </div>
    </section>

    <section id="view-progress" style="display:none;">
      <div class="card progress-panel">
        <div class="round-label" id="round-label"></div>
        <div class="timer" id="timer">0:00</div>
        <div class="submit-count" id="submit-count"></div>
      </div>
      <div class="card section-gap" style="padding:16px;">
        <ul class="roster" id="roster-list-progress"></ul>
      </div>
      <div class="actions-row section-gap">
        <button class="btn secondary" id="force-advance-btn">다음 라운드로 넘기기</button>
        <button class="btn ghost" id="end-btn-progress">세션 종료</button>
      </div>
    </section>

    <section id="view-results" style="display:none;">
      <div class="card" style="padding:24px; text-align:center;">
        <h2 style="margin-top:0;">모든 라운드가 끝났어요</h2>
        <p class="muted">각자 자기 화면에서 자신을 그린 그림들을 확인할 수 있어요. 진행자도 직접 보고 싶다면, 참가자 링크에 접속해서 본인 이름을 선택하면 됩니다.</p>
        <p class="muted" style="font-size:13px;">그림 파일은 서버의 <code>data/sessions/</code> 폴더에 저장되어 있어요.</p>
      </div>
      <div class="actions-row section-gap">
        <button class="btn ghost" id="end-btn-results">세션 완전히 종료</button>
      </div>
    </section>

    <section id="view-ended" style="display:none;">
      <div class="card" style="padding:24px; text-align:center;">
        <h2 style="margin-top:0;">세션이 종료됐어요</h2>
        <p class="muted">새 모임을 시작하려면 새로고침해서 참가자 명단을 다시 입력하세요.</p>
        <button class="btn section-gap" onclick="location.reload()">새로고침</button>
      </div>
    </section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/countdown.js"></script>
  <script src="js/host.js"></script>
</body>
</html>
